spring:
  application:
    name: ticketingLab

  datasource:
    url: jdbc:postgresql://localhost:5432/ticketing
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: create
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    open-in-view: false

  sql:
    init:
      mode: never

logging:
  level:
    org.hibernate.SQL: warn
    org.hibernate.orm.jdbc.bind: off

server:
  port: 9090

springdoc:
  paths-to-match: /api/**
  api-docs:
    path: /docs/api-docs
  swagger-ui:
    path: /docs/swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha
    doc-expansion: none
    persist-authorization: true
    try-it-out-enabled: true

jwt:
  secret: "bXktc2VjcmV0LWtleS1tdXN0LWJlLWF0LWxlYXN0LTMyLWJ5dGVzIQ=="
  access-token-exp-min: 15
  refresh-token-exp-days: 14

app:
  hold:
    ttl-minutes: 5
  reservation:
    ttl-minutes: 15
  sample-data:
    events:
      enabled: false