spring:
  application:
    name: ticketingLab

  datasource:
    driver-class-name: org.postgresql.Driver

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

  jpa:
    hibernate:
      ddl-auto: create
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    open-in-view: false

  sql:
    init:
      mode: never

logging:
  level:
    org.hibernate.SQL: warn
    org.hibernate.orm.jdbc.bind: off

server:
  port: 9090

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true

springdoc:
  paths-to-match: /api/**
  api-docs:
    path: /docs/api-docs
  swagger-ui:
    path: /docs/swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha
    doc-expansion: none
    persist-authorization: true
    try-it-out-enabled: true

jwt:
  secret: ${JWT_SECRET}
  access-token-exp-min: 300
  refresh-token-exp-days: 14

app:
  auth:
    token-session:
      store: ${TOKEN_SESSION_STORE:redis}
  hold:
    ttl-minutes: 5
  reservation:
    ttl-minutes: 15
  sample-data:
    events:
      enabled: false
