spring:
  application:
    name: ticketingLab

  jackson:
    time-zone: Asia/Seoul

  datasource:
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: ${DB_POOL_MAX_SIZE:100}
      minimum-idle: ${DB_POOL_MIN_IDLE:10}

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      connect-timeout: ${REDIS_CONNECT_TIMEOUT:3s}
      timeout: ${REDIS_TIMEOUT:2s}
      repositories:
        enabled: false

  jpa:
    hibernate:
      ddl-auto: create
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    open-in-view: false

  sql:
    init:
      mode: never

logging:
  level:
    org.hibernate.SQL: warn
    org.hibernate.orm.jdbc.bind: off

server:
  port: 9090

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      probes:
        enabled: true
  metrics:
    tags:
      application: ${spring.application.name}
    distribution:
      percentiles-histogram:
        http:
          server:
            requests: true

springdoc:
  paths-to-match: /api/**
  api-docs:
    path: /docs/api-docs
  swagger-ui:
    path: /docs/swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha
    doc-expansion: none
    persist-authorization: true
    try-it-out-enabled: true

jwt:
  secret: ${JWT_SECRET}
  access-token-exp-min: 300
  refresh-token-exp-days: 14

app:
  time-zone: Asia/Seoul
  auth:
    token-session:
      store: ${TOKEN_SESSION_STORE:redis}
      max-sessions-per-user: ${TOKEN_SESSION_MAX_SESSIONS_PER_USER:5}
  hold:
    ttl-minutes: 5
    pre-lock:
      enabled: ${HOLD_PRE_LOCK_ENABLED:true}
      ttl: ${HOLD_PRE_LOCK_TTL:60s}
    seat-queue:
      enabled: ${HOLD_SEAT_QUEUE_ENABLED:true}
      max-per-seat: ${HOLD_SEAT_QUEUE_MAX_PER_SEAT:100}
      ttl: ${HOLD_SEAT_QUEUE_TTL:30s}
    fast-fail:
      enabled: ${HOLD_FAST_FAIL_ENABLED:false}
      max-concurrent: ${HOLD_FAST_FAIL_MAX_CONCURRENT:50}
  reservation:
    ttl-minutes: 15
  expiration:
    cleanup:
      enabled: true
      fixed-delay-ms: 30000
      batch-size: 200
  sample-data:
    events:
      enabled: false
