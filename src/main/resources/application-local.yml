spring:
  config:
    activate:
      on-profile: local
    import: optional:classpath:application-local-secret.yml

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/ticketing}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}

  jpa:
    hibernate:
      ddl-auto: update

app:
  sample-data:
    events:
      enabled: true
