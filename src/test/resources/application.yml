spring:
  datasource:
    url: jdbc:h2:mem:ticketing;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
    open-in-view: false
  sql:
    init:
      mode: never

springdoc:
  paths-to-match: /api/**
  api-docs:
    path: /docs/api-docs
  swagger-ui:
    path: /docs/swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha
    doc-expansion: none
    persist-authorization: true
    try-it-out-enabled: true

jwt:
  secret: "dGVzdC1zZWNyZXQtbXVzdC1iZS1hdC1sZWFzdC0zMi1ieXRlcyEh"
  access-token-exp-min: 300
  refresh-token-exp-days: 14

app:
  auth:
    token-session:
      store: in-memory
  hold:
    ttl-minutes: 5
  reservation:
    ttl-minutes: 15
  sample-data:
    events:
      enabled: false
