services:
  postgres:
    image: postgres:18-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ticketing}
      POSTGRES_USER: ${POSTGRES_USER:-ticketing}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ticketing}
    ports:
      - "127.0.0.1:${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:8.4.2-alpine
    restart: unless-stopped
    ports:
      - "127.0.0.1:${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: docker
      DB_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-ticketing}
      DB_USERNAME: ${POSTGRES_USER:-ticketing}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-ticketing}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_CONNECT_TIMEOUT: ${REDIS_CONNECT_TIMEOUT:-3s}
      REDIS_TIMEOUT: ${REDIS_TIMEOUT:-2s}
      TOKEN_SESSION_MAX_SESSIONS_PER_USER: ${TOKEN_SESSION_MAX_SESSIONS_PER_USER:-5}
      JWT_SECRET: ${JWT_SECRET:-dGVzdC1zZWNyZXQtbXVzdC1iZS1hdC1sZWFzdC0zMi1ieXRlcyEh}
      JPA_DDL_AUTO: ${JPA_DDL_AUTO:-update}
      HOLD_PRE_LOCK_ENABLED: ${HOLD_PRE_LOCK_ENABLED:-true}
      HOLD_PRE_LOCK_TTL: ${HOLD_PRE_LOCK_TTL:-60s}
      HOLD_SEAT_QUEUE_ENABLED: ${HOLD_SEAT_QUEUE_ENABLED:-true}
      HOLD_SEAT_QUEUE_MAX_PER_SEAT: ${HOLD_SEAT_QUEUE_MAX_PER_SEAT:-100}
      HOLD_SEAT_QUEUE_TTL: ${HOLD_SEAT_QUEUE_TTL:-30s}
      HOLD_FAST_FAIL_ENABLED: ${HOLD_FAST_FAIL_ENABLED:-false}
      HOLD_FAST_FAIL_MAX_CONCURRENT: ${HOLD_FAST_FAIL_MAX_CONCURRENT:-50}
      APP_SAMPLE_EVENTS_ENABLED: ${APP_SAMPLE_EVENTS_ENABLED:-true}
      APP_SAMPLE_ADMIN_ENABLED: ${APP_SAMPLE_ADMIN_ENABLED:-true}
      APP_SAMPLE_ADMIN_EMAIL: ${APP_SAMPLE_ADMIN_EMAIL:-admin@example.com}
      APP_SAMPLE_ADMIN_PASSWORD: ${APP_SAMPLE_ADMIN_PASSWORD:-admin1234}
      TZ: Asia/Seoul
      LOG_PATH: /app/logs
      JAVA_OPTS: ${JAVA_OPTS:--Duser.timezone=Asia/Seoul}
    volumes:
      - ./logs:/app/logs
    ports:
      - "127.0.0.1:${BACKEND_PORT:-9090}:9090"
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:9090/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

volumes:
  postgres-data:
